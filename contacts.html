<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Контакты</title>
    <link rel="manifest" href="/manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Henny+Penny&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Neucha&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url(images/bg.png);
            min-height: 100vh;
            font-family: 'Neucha', cursive;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5%;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            width: 100%;
        }

        nav {
            width: 100%;
            margin-bottom: 2%;
        }

        nav div {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        nav a {
            color: aliceblue;
            text-decoration: none;
            font-size: clamp(16px, 3vw, 24px);
            padding: 5px 10px;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.7;
        }

        header > a {
            color: aliceblue;
            text-decoration: none;
            font-size: clamp(30px, 6vw, 60px);
            line-height: 1;
        }

        .namemain {
            font-family: 'Henny Penny', cursive;
            color: aliceblue;
            font-size: clamp(40px, 8vw, 80px);
            margin: 2% 0;
            text-align: center;
            line-height: 1.2;
            word-break: break-word;
        }

        .header-decoration {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(10px, 3vw, 30px);
            width: 100%;
            flex-wrap: wrap;
        }

        .contacts {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            margin: 20px 0;
        }

        .contacts h1 {
            font-size: clamp(24px, 4vw, 40px);
            margin-bottom: 15px;
            color: #2c1810;
        }

        .contacts p {
            font-size: clamp(18px, 2.5vw, 24px);
            margin: 10px 0;
            color: #2c1810;
        }

        .cute-image {
            width: 80%;
            max-width: 600px;
            height: auto;
            display: block;
            margin: 30px auto;
            margin-bottom: 5%;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 3%;
            }

            nav div {
                gap: 10px;
            }

            .contacts {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 2%;
            }

            .contacts {
                padding: 15px;
            }

            .cute-image {
                width: 95%;
            }
        }
    </style>

</head>
<body>


<div class="container">
<header>
  <nav>
    <div>
    <a href="index.html">Главная</a>
    <a href="contacts.html">Контакты</a>
    <a href="bron.html">Цены</a>
    </div>
  </nav>
  
  <div class="header-decoration">
    <a class="namemain">&#10039AliceCafe&#10039</a>
  </div>
</header>

<div class="contacts">
    <h1>Контакты:</h1>
    <p>E-mail: alicecafe@mail.com</p>
    <p>Телефон: +7 956 362 82 03</p>
</div>

<img src="images/cute.png" alt="Cute image" class="cute-image">

</div>

<script>
  // Проверяем, поддерживает ли браузер Service Worker
  if ('serviceWorker' in navigator) {
    // Регистрируем Service Worker после загрузки страницы
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(registration => {
          console.log('✅ Service Worker зарегистрирован:', registration);
        })
        .catch(error => {
          console.log('❌ Ошибка регистрации Service Worker:', error);
        });
    });
  }
</script>
</body>
</html>
